apiVersion: apps/v1
kind: Deployment
metadata:
  name: exodia
  namespace: exodia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exodia
  template:
    metadata:
      labels:
        app: exodia
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: exodia
          image: harbor.mrzt.dev/mrzt/exodia:master
          env:
            - name: PREFIX
              value: "."
            - name: LOG_LEVEL
              value: info
            - name: PLAYER_IDLE_TIMEOUT_MS
              value: "300000"
            # Audio backend: "ytdl" (direct YouTube) or "lavalink". ytdl needs
            # YTDL_COOKIE (a logged-in session) to beat YouTube's bot-check from a
            # DC IP — add it as an exodia-secret key or music will fail to stream.
            - name: AUDIO_PROVIDER
              value: "ytdl"
            - name: SPORTSDB_API_KEY
              value: "3"
            - name: ADMIN_USER_ID
              valueFrom:
                secretKeyRef:
                  name: exodia-secret
                  key: admin-user-id
            - name: DISCORD_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: exodia-secret
                  key: discord-client-id
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: exodia-secret
                  key: discord-token
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: exodia-secret
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: exodia-secret
                  key: redis-url
            - name: LAVALINK_HOST
              value: "lavalink"
            - name: LAVALINK_PORT
              value: "2333"
            - name: LAVALINK_SECURE
              value: "false"
            - name: LAVALINK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: exodia-secret
                  key: lavalink-password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
