name: Deploy
run-name: Deploy 🚀
on:
  push:
    branches:
      - master

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.mrzt.dev
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          context: .
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: harbor.mrzt.dev/mrzt/exodia:${{ github.ref_name }}
          cache-from: type=registry,ref=harbor.mrzt.dev/mrzt/exodia:buildcache
          cache-to: type=registry,ref=harbor.mrzt.dev/mrzt/exodia:buildcache,mode=max
